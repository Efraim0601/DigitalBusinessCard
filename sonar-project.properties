# Analyse locale / CI : sonar-scanner à la racine du dépôt.
# Avant l’analyse, générer la couverture : npm run test:coverage
sonar.projectKey=vcard
sonar.projectName=vcard
sonar.sources=app,server,scripts,types
sonar.tests=tests
sonar.test.inclusions=tests/**/*.test.ts
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.sourceEncoding=UTF-8

# Rapports de bench / build
sonar.exclusions=**/coverage/**,**/.nuxt/**,**/.output/**,**/node_modules/**,**/perf-reports/**,**/perf-reports-test/**

# Duplications : ne pas comparer les tests entre eux ; i18n FR/EN volontairement miroir
sonar.cpd.exclusions=tests/**,**/app/locales/translations.ts

# Ne pas exiger de couverture sur le code d’infrastructure de tests
sonar.coverage.exclusions=**/tests/**,**/tests/helpers/**,**/tests/shims/**,**/*.nuxt.test.ts,**/*.nuxt.spec.ts,**/vitest.config.ts

# Libellés i18n (mot de passe / password) : faux positifs sur la règle « secrets en dur » (S2068).
sonar.issue.ignore.multicriteria=e1,e2
sonar.issue.ignore.multicriteria.e1.ruleKey=typescript:S2068
sonar.issue.ignore.multicriteria.e1.resourceKey=**/app/locales/translations.ts
sonar.issue.ignore.multicriteria.e2.ruleKey=javascript:S2068
sonar.issue.ignore.multicriteria.e2.resourceKey=**/app/locales/translations.ts
