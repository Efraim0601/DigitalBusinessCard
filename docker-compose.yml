version: "3.9"

services:
  db:
    image: postgres:16
    container_name: vcard-db
    restart: always
    environment:
      POSTGRES_DB: vcard
      POSTGRES_USER: vcard
      POSTGRES_PASSWORD: vcard
    # Utilise le port 5433 sur la machine hôte pour éviter le conflit
    # avec un PostgreSQL déjà présent sur 5432.
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  app:
    build: .
    container_name: vcard-app
    restart: always
    environment:
      NODE_ENV: production
      PGHOST: db
      PGPORT: 5432
      PGDATABASE: vcard
      PGUSER: vcard
      PGPASSWORD: vcard
    ports:
      - "3000:3000"
    depends_on:
      - db

volumes:
  pgdata:

