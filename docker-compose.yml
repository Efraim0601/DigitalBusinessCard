# Build qui échoue avec "apparmor ... /proc/thread-self/attr/apparmor/exec" :
#   ./scripts/docker-up-build.sh
# (BuildKit désactivé + voir commentaires dans ce script pour Docker Snap / apparmor.)
#
# Accélération : le Dockerfile utilise un cache npm BuildKit (`--mount=type=cache`).
# Préférez `docker compose build` avec BuildKit activé (Docker 23+ / Compose v2 : souvent par défaut).
# Sinon : export DOCKER_BUILDKIT=1 COMPOSE_DOCKER_CLI_BUILD=1
services:
  db:
    image: postgres:16
    container_name: vcard-db
    restart: always
    environment:
      POSTGRES_DB: vcard
      POSTGRES_USER: vcard
      POSTGRES_PASSWORD: vcard
    # Utilise le port 5433 sur la machine hôte pour éviter le conflit
    # avec un PostgreSQL déjà présent sur 5432.
    ports:
      - "5435:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  app:
    build: .
    container_name: vcard-app
    restart: always
    environment:
      NODE_ENV: production
      PGHOST: db
      PGPORT: 5432
      PGDATABASE: vcard
      PGUSER: vcard
      PGPASSWORD: vcard
    # Le front est exposé sur le port 8765 de la machine hôte
    ports:
      - "8765:3000"
    depends_on:
      - db

volumes:
  pgdata:

